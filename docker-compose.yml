services:
  orchestrator:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Required by the tool runner (docker socket for tool execution).
      - LOG_DIR=/app/logs
      - LOG_FILE=/app/logs/orchestrator.log
      # Use a shared Docker named volume so `docker run -v ...` from inside this container
      # can mount the wordlist into the john tool container reliably.
      - HOST_DATA_DIR=volume:john_data
      - JOHN_LOCAL_DATA_DIR=/app/data
      - CONTAINER_DATA_DIR=/data
      - JOHN_WORDLIST_MOUNT_MODE=host_path
      - TOOL_EXECUTION_TIMEOUT_SECS=900
      - TOOL_OUTPUT_MAX_CHARS=200000
    volumes:
      # Persist logs and provide a place for john wordlists/hashes.
      - ./logs:/app/logs
      # Also back the john tool with a Docker named volume.
      - john_data:/app/data:rw
      # Allow the orchestrator container to run `docker run ...` for tool execution.
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

volumes:
  john_data:

